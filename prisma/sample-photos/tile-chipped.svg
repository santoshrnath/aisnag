<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="t" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcd6cc"/>
      <stop offset="100%" stop-color="#b3aa9c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="#f4f0e9"/>
  <!-- Tile grid -->
  <g fill="url(#t)" stroke="#8a8276" stroke-width="3">
    <rect x="40" y="40" width="360" height="360"/>
    <rect x="400" y="40" width="360" height="360"/>
    <rect x="40" y="400" width="360" height="360"/>
    <rect x="400" y="400" width="360" height="360"/>
  </g>
  <!-- Grout darker -->
  <g fill="#5e564a">
    <rect x="395" y="40" width="10" height="720"/>
    <rect x="40" y="395" width="720" height="10"/>
  </g>
  <!-- Chipped corner — irregular polygon revealing dark underlay -->
  <polygon points="40,400 130,395 165,420 145,470 95,490 60,460" fill="#3a3128"/>
  <polygon points="60,420 110,418 135,440 120,460 95,470" fill="#241d16"/>
  <!-- Tiny chip fragments -->
  <circle cx="180" cy="500" r="6" fill="#3a3128"/>
  <circle cx="200" cy="525" r="3" fill="#3a3128"/>
  <circle cx="160" cy="540" r="4" fill="#3a3128"/>
</svg>
