<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#eeeae3"/>
  <!-- Wall texture -->
  <g opacity="0.06">
    <rect x="0" y="0" width="800" height="800" fill="url(#dots)"/>
  </g>
  <!-- Socket box — tilted (the defect) -->
  <g transform="translate(400 400) rotate(7)">
    <rect x="-150" y="-150" width="300" height="300" rx="14" fill="#f7f5ef" stroke="#bcb4a4" stroke-width="3"/>
    <rect x="-130" y="-130" width="260" height="260" rx="8" fill="#fbfaf6"/>
    <!-- UK socket pins (square) -->
    <rect x="-30" y="-80" width="60" height="22" rx="3" fill="#222"/>
    <rect x="-90" y="20" width="60" height="22" rx="3" fill="#222"/>
    <rect x="30" y="20" width="60" height="22" rx="3" fill="#222"/>
    <!-- Switch -->
    <rect x="-40" y="80" width="80" height="40" rx="6" fill="#e6e1d6" stroke="#a89e88" stroke-width="2"/>
    <circle cx="60" cy="100" r="8" fill="#c0b69e"/>
  </g>
  <!-- Highlight the gap (the defect) -->
  <g stroke="#d04545" stroke-width="2" fill="none" stroke-dasharray="6 4">
    <rect x="246" y="246" width="320" height="320" rx="14"/>
  </g>
  <!-- Annotation arrow -->
  <g stroke="#d04545" stroke-width="3" fill="none">
    <line x1="610" y1="240" x2="540" y2="280"/>
    <polygon points="540,280 555,278 552,290" fill="#d04545"/>
  </g>
  <text x="620" y="225" font-family="ui-sans-serif" font-size="20" fill="#9a2222" font-weight="600">~5mm gap</text>
</svg>
